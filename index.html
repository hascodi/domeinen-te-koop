<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>This domain is for sale</title>
  <meta name="description" content="This premium domain name is available for purchase." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f5f4f0;
      --bg3: #eeedea;
      --text: #141414;
      --text2: #5a5a5a;
      --text3: #9a9a9a;
      --border: rgba(0,0,0,0.09);
      --border2: rgba(0,0,0,0.16);
      --accent: #141414;
      --accent-fg: #ffffff;
      --green-bg: #E1F5EE;
      --green-fg: #085041;
      --amber-bg: #FAEEDA;
      --amber-fg: #633806;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1c;
        --bg2: #161616;
        --bg3: #222222;
        --text: #f0efeb;
        --text2: #9a9a94;
        --text3: #606059;
        --border: rgba(255,255,255,0.08);
        --border2: rgba(255,255,255,0.15);
        --accent: #f0efeb;
        --accent-fg: #1c1c1c;
        --green-bg: #085041;
        --green-fg: #9FE1CB;
        --amber-bg: #633806;
        --amber-fg: #FAC775;
      }
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg2);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ── Layout ── */
    .page {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 1.5rem;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-top: 4rem;
      padding-bottom: 4rem;
    }

    /* ── Domain display ── */
    .domain-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 0.75rem;
    }

    .domain-name {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(26px, 6vw, 42px);
      font-weight: 400;
      color: var(--text);
      line-height: 1.15;
      margin-bottom: 0.5rem;
      word-break: break-all;
    }

    .domain-tagline {
      font-size: 14px;
      color: var(--text2);
      font-weight: 300;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }

    /* ── Price card ── */
    .price-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
      margin-bottom: 1rem;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .price-amount {
      font-size: 32px;
      font-weight: 500;
      color: var(--text);
      line-height: 1;
    }

    .price-note {
      font-size: 12px;
      color: var(--text3);
      font-weight: 300;
      text-align: right;
      line-height: 1.5;
    }

    .divider {
      height: 0.5px;
      background: var(--border);
      margin-bottom: 1.25rem;
    }

    /* ── Buttons ── */
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      display: block;
      width: 100%;
      text-align: center;
      padding: 13px 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.12s, transform 0.1s;
      border: none;
    }

    .btn:active { transform: scale(0.985); }

    .btn-primary {
      background: var(--accent);
      color: var(--accent-fg);
    }

    .btn-primary:hover { opacity: 0.82; }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border: 0.5px solid var(--border2);
    }

    .btn-secondary:hover { background: var(--bg3); }

    /* ── Trust strip ── */
    .trust {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-top: 1.75rem;
    }

    .trust-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11.5px;
      color: var(--text3);
    }

    .trust-item svg {
      width: 13px;
      height: 13px;
      stroke: var(--text3);
      flex-shrink: 0;
    }

    /* ── Offer modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg);
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      border: 0.5px solid var(--border);
    }

    .modal h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      font-weight: 400;
      margin-bottom: 0.4rem;
    }

    .modal-sub {
      font-size: 13px;
      color: var(--text2);
      font-weight: 300;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }

    .field {
      margin-bottom: 1rem;
    }

    .field label {
      display: block;
      font-size: 12px;
      color: var(--text2);
      font-weight: 500;
      margin-bottom: 5px;
      letter-spacing: 0.03em;
    }

    .field input,
    .field textarea {
      width: 100%;
      padding: 10px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 300;
      color: var(--text);
      background: var(--bg2);
      border: 0.5px solid var(--border2);
      border-radius: 8px;
      outline: none;
      transition: border-color 0.12s;
      resize: none;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--text3);
    }

    .modal-btns {
      display: flex;
      gap: 8px;
      margin-top: 1.25rem;
    }

    .modal-btns .btn { flex: 1; }

    /* ── Success state ── */
    .success {
      display: none;
      text-align: center;
      padding: 1rem 0;
    }

    .success-icon {
      width: 40px;
      height: 40px;
      background: var(--green-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }

    .success-icon svg {
      width: 18px;
      height: 18px;
      stroke: var(--green-fg);
    }

    .success h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 18px;
      font-weight: 400;
      margin-bottom: 0.4rem;
    }

    .success p {
      font-size: 13px;
      color: var(--text2);
      font-weight: 300;
      line-height: 1.6;
    }

    /* ── Not found ── */
    .not-found {
      text-align: center;
      padding: 4rem 1rem;
    }

    .not-found h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      font-weight: 400;
      margin-bottom: 0.75rem;
    }

    .not-found p {
      font-size: 14px;
      color: var(--text2);
      font-weight: 300;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 1.5rem 1rem 2rem;
      font-size: 11.5px;
      color: var(--text3);
      font-weight: 300;
    }
  </style>
</head>
<body>

<div class="page">
  <div id="content"></div>
</div>

<footer id="footer" style="display:none">
  Vragen? <a onclick="openModal('offer')" style="color:var(--text2);text-decoration:none;border-bottom:0.5px solid var(--border2);cursor:pointer;">Neem contact op</a>
</footer>

<!-- Offer modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div id="modal-form-wrap">
      <h2 id="modal-title">Doe een bod</h2>
      <p class="modal-sub" id="modal-sub">Vul je gegevens in. Je ontvangt binnen 24 uur een reactie.</p>
      <input type="hidden" id="f-type" value="offer" />
      <div class="field">
        <label>Jouw naam</label>
        <input type="text" id="f-name" placeholder="Jan Janssen" />
      </div>
      <div class="field">
        <label>E-mailadres</label>
        <input type="email" id="f-email" placeholder="jan@bedrijf.com" />
      </div>
      <div class="field" id="f-bid-wrap">
        <label>Bod (€)</label>
        <input type="number" id="f-bid" placeholder="500" min="1" />
      </div>
      <div class="field">
        <label>Toelichting (optioneel)</label>
        <textarea id="f-note" rows="3" placeholder="Waarvoor wil je het domein gebruiken?"></textarea>
      </div>
      <div class="modal-btns">
        <a class="btn btn-secondary" onclick="closeModal()">Annuleren</a>
        <a class="btn btn-primary" id="submit-btn" onclick="submitOffer()">Bod versturen</a>
      </div>
    </div>
    <div class="success" id="modal-success">
      <div class="success-icon">
        <svg viewBox="0 0 18 18" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l4 4 8-8"/>
        </svg>
      </div>
      <h3>Bod ontvangen</h3>
      <p>We nemen binnen 24 uur contact met je op via e-mail.</p>
    </div>
  </div>
</div>

<script>
const FORMSPREE_URL = 'https://formspree.io/f/mgorkqbo';

const domains = {
  'sell2rent.be': {
    tagline: 'Een krachtig domein voor de vastgoedsector — ideaal voor diensten die verhuur na verkoop faciliteren.',
    price: '€ 6.500',
    priceNote: 'Vaste prijs\nof doe een bod',
    buySubject: 'Aankoop sell2rent.be',
  },
  'verkoopenhuur.be': {
    tagline: 'Nederlandstalig, direct en memorabel. Sterk merkdomein voor vastgoed- en verhuurplatformen in België.',
    price: '€ 6.500',
    priceNote: 'Vaste prijs\nof doe een bod',
    buySubject: 'Aankoop verkoopenhuur.be',
  },
  'decisionliability.com': {
    tagline: 'Niche .com-domein voor compliance, AI-governance en juridische verantwoordelijkheid rond besluitvorming.',
    price: '€ 1.200',
    priceNote: 'Vaste prijs\nof doe een bod',
    buySubject: 'Aankoop decisionliability.com',
  },
  'decisionoversight.com': {
    tagline: 'Sterk domein voor toezicht- en auditplatformen rond AI- en bedrijfsbeslissingen.',
    price: '€ 800',
    priceNote: 'Vaste prijs\nof doe een bod',
    buySubject: 'Aankoop decisionoversight.com',
  },
  'ethicalcontrol.com': {
    tagline: 'Tijdloos en internationaal inzetbaar voor AI-ethiek, compliance en verantwoord bestuur.',
    price: '€ 800',
    priceNote: 'Vaste prijs\nof doe een bod',
    buySubject: 'Aankoop ethicalcontrol.com',
  },
  'secureattest.com': {
    tagline: 'Ideaal voor cybersecurity- en attestatieplatformen. Kort, memorabel en professioneel.',
    price: '€ 800',
    priceNote: 'Vaste prijs\nof doe een bod',
    buySubject: 'Aankoop secureattest.com',
  },
  'ethicsasvalue.com': {
    tagline: 'Een thought leadership-domein voor organisaties die ethiek als strategische waarde positioneren.',
    price: '€ 1.200',
    priceNote: 'Vaste prijs\nof doe een bod',
    buySubject: 'Aankoop ethicsasvalue.com',
  },
  'policydrivenai.com': {
    tagline: 'Krachtig domein voor beleidsgedreven AI-initiatieven, overheden en reguleringsplatformen.',
    price: '€ 1.200',
    priceNote: 'Vaste prijs\nof doe een bod',
    buySubject: 'Aankoop policydrivenai.com',
  },
  'verantwoordeai.be': {
    tagline: 'Nederlandstalig ankerpunt voor verantwoorde AI-initiatieven in België en Nederland.',
    price: '€ 800',
    priceNote: 'Vaste prijs\nof doe een bod',
    buySubject: 'Aankoop verantwoordeai.be',
  },
  'aiinstituut.be': {
    tagline: 'Premium generiek .be-domein. Ideaal voor een AI-opleiding, kenniscentrum of onderzoeksinstelling.',
    price: '€ 4.000',
    priceNote: 'Vaste prijs\nof doe een bod',
    buySubject: 'Aankoop aiinstituut.be',
  },
  'aisales.be': {
    tagline: 'Compact en direct. Sterk domein voor AI-gedreven sales tools en platforms op de Belgische markt.',
    price: '€ 700',
    priceNote: 'Vaste prijs\nof doe een bod',
    buySubject: 'Aankoop aisales.be',
  },
  'aiprojecten.be': {
    tagline: 'Herkenbaar en SEO-vriendelijk domein voor AI-projectmanagement of consultancydiensten.',
    price: '€ 350',
    priceNote: 'Vaste prijs\nof doe een bod',
    buySubject: 'Aankoop aiprojecten.be',
  },
  'aiintegratie.be': {
    tagline: 'Duidelijk en beschrijvend. Geschikt voor AI-integratiebedrijven en technologiepartners.',
    price: '€ 450',
    priceNote: 'Vaste prijs\nof doe een bod',
    buySubject: 'Aankoop aiintegratie.be',
  },
  'aivault.be': {
    tagline: 'Mysterieus en krachtig. Interessant voor AI-dataopslag, security of premium kennisplatformen.',
    price: '€ 350',
    priceNote: 'Vaste prijs\nof doe een bod',
    buySubject: 'Aankoop aivault.be',
  },
  'aiuniversiteit.be': {
    tagline: 'Hoogwaardig educatief domein. Ideaal voor een online AI-universiteit of grootschalig opleidingsplatform.',
    price: '€ 3.000',
    priceNote: 'Vaste prijs\nof doe een bod',
    buySubject: 'Aankoop aiuniversiteit.be',
  },
};

// Detect which domain we're on
function detectDomain() {
  const host = window.location.hostname.replace('www.', '');
  const params = new URLSearchParams(window.location.search);
  const override = params.get('domain');
  if (override) return override;
  const hash = window.location.hash.replace('#', '');
  const hashParams = new URLSearchParams(hash);
  const hashOverride = hashParams.get('domain');
  if (hashOverride) return hashOverride;
  return host;
}

function openModal(mode) {
  mode = mode || 'offer';
  document.getElementById('f-type').value = mode;
  if (mode === 'buy') {
    document.getElementById('modal-title').textContent = 'Interesse in aankoop';
    document.getElementById('modal-sub').textContent = 'Vul je gegevens in en we nemen binnen 24 uur contact op.';
    document.getElementById('f-bid-wrap').style.display = 'none';
    document.getElementById('submit-btn').textContent = 'Verstuur aanvraag';
  } else {
    document.getElementById('modal-title').textContent = 'Doe een bod';
    document.getElementById('modal-sub').textContent = 'Vul je gegevens in. Je ontvangt binnen 24 uur een reactie.';
    document.getElementById('f-bid-wrap').style.display = '';
    document.getElementById('submit-btn').textContent = 'Bod versturen';
  }
  document.getElementById('modal').classList.add('open');
}

function openBuyModal() { openModal('buy'); }

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  setTimeout(() => {
    document.getElementById('modal-form-wrap').style.display = '';
    document.getElementById('modal-success').style.display = 'none';
    document.getElementById('f-name').value = '';
    document.getElementById('f-email').value = '';
    document.getElementById('f-bid').value = '';
    document.getElementById('f-note').value = '';
    const submitBtn = document.getElementById('submit-btn');
    submitBtn.textContent = 'Bod versturen';
    submitBtn.style.opacity = '';
    submitBtn.style.pointerEvents = '';
  }, 300);
}

async function submitOffer() {
  const name  = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const bid   = document.getElementById('f-bid').value.trim();
  const note  = document.getElementById('f-note').value.trim();
  const type  = document.getElementById('f-type').value;
  const domain = detectDomain();
  const isBuy = type === 'buy';

  if (!name || !email || (!isBuy && !bid)) {
    alert('Vul naam en e-mailadres in' + (isBuy ? '.' : ', en je bod.'));
    return;
  }

  const submitBtn = document.getElementById('submit-btn');
  submitBtn.textContent = 'Versturen…';
  submitBtn.style.opacity = '0.6';
  submitBtn.style.pointerEvents = 'none';

  try {
    const res = await fetch(FORMSPREE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        type: isBuy ? 'Aankoop aan vraagprijs' : 'Bod',
        domein: domain,
        naam: name,
        email: email,
        bod: isBuy ? 'Vraagprijs' : `€${bid}`,
        toelichting: note || '—',
        _subject: isBuy ? `Koopinteresse: ${domain}` : `Bod op ${domain}: €${bid}`
      })
    });

    if (res.ok) {
      document.getElementById('modal-form-wrap').style.display = 'none';
      document.getElementById('modal-success').style.display = 'block';
    } else {
      alert('Er ging iets mis. Probeer opnieuw.');
      submitBtn.textContent = isBuy ? 'Verstuur aanvraag' : 'Bod versturen';
      submitBtn.style.opacity = '';
      submitBtn.style.pointerEvents = '';
    }
  } catch(e) {
    alert('Geen verbinding. Probeer opnieuw.');
    submitBtn.textContent = isBuy ? 'Verstuur aanvraag' : 'Bod versturen';
    submitBtn.style.opacity = '';
    submitBtn.style.pointerEvents = '';
  }
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Render page
const domain = detectDomain();
const data = domains[domain];
const content = document.getElementById('content');
const footer = document.getElementById('footer');

if (data) {
  document.title = `${domain} — te koop`;
  footer.style.display = 'block';

  content.innerHTML = `
    <div class="domain-label">Domeinnaam te koop</div>
    <div class="domain-name">${domain}</div>
    <p class="domain-tagline">${data.tagline}</p>

    <div class="price-card">
      <div class="price-row">
        <div class="price-amount">${data.price}</div>
        <div class="price-note">${data.priceNote.replace('\n','<br>')}</div>
      </div>
      <div class="divider"></div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="openBuyModal()">
          Koop nu voor ${data.price}
        </button>
        <button class="btn btn-secondary" onclick="openModal('offer')">Doe een bod</button>
      </div>
    </div>

    <div class="trust">
      <div class="trust-item">
        <svg viewBox="0 0 14 14" fill="none" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 1l1.4 3.4L12 4.9 9.4 7.4l.7 3.6L7 9.4 3.9 11l.7-3.6L2 4.9l3.6-.5L7 1z"/>
        </svg>
        Veilige overdracht via Escrow
      </div>
      <div class="trust-item">
        <svg viewBox="0 0 14 14" fill="none" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="6" width="10" height="7" rx="1.5"/>
          <path d="M4.5 6V4.5a2.5 2.5 0 015 0V6"/>
        </svg>
        Directe overdracht na betaling
      </div>
      <div class="trust-item">
        <svg viewBox="0 0 14 14" fill="none" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="7" cy="7" r="5.5"/>
          <path d="M7 4.5v3l1.8 1.2"/>
        </svg>
        Reactie binnen 24 uur
      </div>
    </div>
  `;
} else {
  content.innerHTML = `
    <div class="not-found">
      <h1>Domein niet gevonden</h1>
      <p>Dit domein staat niet in onze verkooplijst.</p>
    </div>
  `;
}
</script>
</body>
</html>
